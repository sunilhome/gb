/* ===== INTRO ===== */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 10000;
}

/* CURTAIN */
#curtain {
  position: fixed;
  width: 100%;
  height: 100%;
  top: 0;
  z-index: 9000;
}

.panel {
  position: absolute;
  width: 50%;
  height: 100%;
  background: black;
  transition: transform 3s ease-in-out;
}

.left { left: 0; }
.right { right: 0; }

#curtain.open .left {
  transform: translateX(-100%);
}

#curtain.open .right {
  transform: translateX(100%);
}

/* BUDDHA IMAGE */
#buddha {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
  top: 0;
  z-index: 8000;

  opacity: 0;
  transform: translateY(0);
  transition: transform 3s ease, opacity 1.5s;
}

</head>

<script>

window.onload = function () {

  // 1️⃣ show intro text (already visible by default)
  setTimeout(() => {
    document.getElementById("intro").style.opacity = "1";
  }, 300);

  // 2️⃣ open curtain
  setTimeout(() => {
    document.getElementById("curtain").classList.add("open");
  }, 2000);

  // 3️⃣ show Buddha image
  setTimeout(() => {
    document.getElementById("buddha").style.opacity = "1";
  }, 5000);

  // 4️⃣ slide Buddha down
  setTimeout(() => {
    document.getElementById("buddha").style.transform = "translateY(100%)";
  }, 7000);

  // 5️⃣ show main page
  setTimeout(() => {
    document.getElementById("buddha").style.opacity = "0";
    document.body.style.overflow = "auto";
  }, 9000);

};

</script>
