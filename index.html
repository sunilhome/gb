<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Temple Page</title>

<link rel="stylesheet" href="provinces/dis_style.css">

<style>

/* ===== BODY ===== */
body {
  margin: 0;
  overflow: hidden;
}

/* ===== INTRO TEXT ===== */
#intro {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 11000; /* top */
  text-align: center;
}

#intro div:first-child {
  font-size: 28px;
  margin-bottom: 10px;
}

#intro div:last-child {
  font-size: 22px;
  color: gold;
}

/* ===== CURTAIN ===== */
#curtain {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 10000;
  pointer-events: none;
}

.panel {
  position: absolute;
  width: 50%;
  height: 100%;
  background: black;
  transition: transform 2s ease-in-out;
}

.left { left: 0; }
.right { right: 0; }

/* closed state (default visible) */
#curtain .left { transform: translateX(0); }
#curtain .right { transform: translateX(0); }

/* open animation */
#curtain.open .left {
  transform: translateX(-100%);
}

#curtain.open .right {
  transform: translateX(100%);
}

/* ===== BUDDHA IMAGE ===== */
#buddha {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 5000; /* behind curtain */
}
#buddha {
  transition: transform 3s ease-in-out;
}

/* slide down */
#buddha.slide-down {
  transform: translateY(100%);
}
/* ===== MAIN CONTENT ===== */
.main-content {
  position: relative;
  z-index: 1;
}
.main-content,
.content,
.box {
  position: relative;
  z-index: 1;
}
</style>

</head>

<body>

<!-- ===== INTRO TEXT ===== -->
<div id="intro">
  <div>veheravihara.lk</div>
  <div>ඔබ සාදරයෙන් පිළිගනිමු</div>
</div>

<!-- ===== CURTAIN ===== -->
<div id="curtain">
  <div class="panel left"></div>
  <div class="panel right"></div>
</div>

<!-- ===== BACKGROUND IMAGE ===== -->
<img id="buddha" src="a.webp">

<!-- ===== MAIN PAGE ===== -->
<div class="main-content">

<div class="top-band">
  <span class="top-band-text">veheravihara.lk</span>
</div>

<div class="content">
<div class="sub-band">
  <img src="provinces/1.png" class="sub-band-icon">
  <div class="sub-band-text1">
    <p>ශ්‍රී ලංකාවේ බෞද්ධ සිද්ධස්ථාන</p>
  </div>
  <div class="sub-band-text en-text">
    <p>Buddhist Temples In Sri Lanka</p>
  </div>
</div>
</div>

</div>

<!-- ===== SCRIPT ===== -->
<script>
document.addEventListener("DOMContentLoaded", function () {

  const curtain = document.getElementById("curtain");
  const intro = document.getElementById("intro");
  const buddha = document.getElementById("buddha");

  // 1️⃣ curtain open
  setTimeout(() => {
    curtain.classList.add("open");
  }, 2000);

  // 2️⃣ hide intro
  setTimeout(() => {
    intro.style.display = "none";
  }, 2200);

  // 3️⃣ allow scroll
  setTimeout(() => {
    document.body.style.overflow = "auto";
  }, 4000);

  // 4️⃣ slide image (DIRECT STYLE FIX)
setTimeout(() => {
  buddha.style.transform = "translateY(100%)";
  document.body.style.overflow = "auto";
}, 4500 + 3000);
});
</script>
</html>
