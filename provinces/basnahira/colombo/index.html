<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Temple Page</title>
<meta name="description" id="metaDescription" content="">

<link rel="stylesheet" href="../../dis_style.css">
</head>

<body class="page-2">

<!-- TOP BAND -->
<div class="top-band">
  <span class="top-band-text">veheravihara.lk</span>
</div>

<!-- MAIN CONTENT -->
<main class="content">

  <!-- SUB BAND -->
  <div class="sub-band">
    <img src="../../1.png" class="sub-band-icon" alt="Icon">

    <div class="sub-band-text">
      <p class="si-text">බස්නාහිර පළාතේ බෞද්ධ සිද්ධස්ථාන</p>
      <p class="en-text1">Buddhist Temples In Western Province</p>
    </div>
  </div>

  <!-- TEMPLE GRID -->
  <div id="templeGrid" class="temple-grid"></div>

  <!-- BACK BUTTON -->
  <button onclick="history.back()" class="back-button">පෙර පිටුවට</button>

</main>

<!-- FOOTER -->
<footer>
  <div class="footer-content">
    © ව්‍යාපෘතිය: සුනිල් රණසිංහ <br>
    සංකල්පය: දේශ කීර්ති ශ්‍රී දේශබන්දු<br>
    සම්පත් රණසිංහ<br>
    දත්ත: ධනේශ් රණසිංහ
  </div>
</footer>
<script>
fetch("temples.txt")
.then(response => response.text())
.then(data => {
    const grid = document.getElementById("templeGrid");

    data.trim().split("\n").forEach(line => {
        const parts = line.split("|");
        if (parts.length !== 3) return;

        const folder = parts[0].trim();
        const siName = parts[1].trim();
        const enName = parts[2].trim();

        const box = document.createElement("div");
        box.className = "box";

        const a = document.createElement("a");
        a.href = "../../../" + folder + "/";
        a.className = "title-link";

        const titleBox = document.createElement("div");
        titleBox.className = "title-box2";

        const si = document.createElement("p");
        si.className = "temple-si";
        si.textContent = siName;

        const en = document.createElement("p");
        en.className = "temple-en";
        en.textContent = enName;

        titleBox.appendChild(si);
        titleBox.appendChild(en);
        a.appendChild(titleBox);
        box.appendChild(a);
        grid.appendChild(box);
    });

    // ✅ START animation AFTER content is ready
    document.body.classList.add("page-slide-up");

});
</script>

</body>
</html>
