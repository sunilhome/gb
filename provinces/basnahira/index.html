<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>බස්නාහිර පළාත | Western Province</title>

<link rel="stylesheet" href="../../provinces/dis_style.css">

<style>
/* prevent scroll during animation */
body {
  overflow: hidden;
  margin: 0;
}

/* smooth wrapper animation */
.page-slide-up {
  animation: slideUp 2.3s cubic-bezier(0.22, 1, 0.36, 1);
  will-change: transform;
  transform: translateZ(0);
}

/* animation */
@keyframes slideUp {
  from {
    transform: translateY(100%);
  }
  to {
    transform: translateY(0);
  }
}

/* after animation scroll allowed */
body.ready {
  overflow: auto;
}
</style>

</head>

<body class="page-2">

<!-- WRAPPER (IMPORTANT) -->
<div class="page-slide-up">

<div class="top-band">
  <span class="top-band-text">veheravihara.lk</span>
</div>

<main class="content">

<div class="sub-band">
  <img src="../../provinces/1.png" class="sub-band-icon">

  <div class="sub-band-text1">
    <p>ශ්‍රී ලංකාවේ බෞද්ධ සිද්ධස්ථාන</p>
  </div>

  <div class="sub-band-text en-text">
    <p>Buddhist Temples In Sri Lanka</p>
  </div>
</div>

</main>

<!-- DISTRICTS -->

<div class="box">
  <a href="colombo/" class="title-link district-link" data-audio="colombo.mp3">
    <div class="title-box1">
      <h2>කොළඹ දිස්ත්‍රික්කය</h2>
      <h2>Colombo District</h2>
    </div>
  </a>
</div>

<div class="box">
  <a href="gampaha/" class="title-link district-link" data-audio="gampaha.mp3">
    <div class="title-box1">
      <h2>ගම්පහ දිස්ත්‍රික්කය</h2>
      <h2>Gampaha District</h2>
    </div>
  </a>
</div>

<div class="box">
  <a href="kaluthara/" class="title-link district-link" data-audio="kaluthara.mp3">
    <div class="title-box1">
      <h2>කළුතර දිස්ත්‍රික්කය</h2>
      <h2>Kalutara District</h2>
    </div>
  </a>
</div>

<footer>
  <div class="footer-content">
    © ව්‍යාපෘතිය: සුනිල් රණසිංහ <br>
    සංකල්පය: දේශ කීර්ති ශ්‍රී දේශබන්දු<br>
    සම්පත් රණසිංහ<br>
    දත්ත: ධනේශ් රණසිංහ
  </div>
</footer>

</div> <!-- END wrapper -->

<script>
document.addEventListener("DOMContentLoaded", function () {

  const links = document.querySelectorAll(".district-link");

  links.forEach(link => {

    link.addEventListener("click", function (e) {

      e.preventDefault();

      /* =========================
         🌊 RIPPLE EFFECT
      ========================= */
      const ripple = document.createElement("span");

      const rect = link.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);

      ripple.style.width = ripple.style.height = size + "px";
      ripple.style.left = (e.clientX - rect.left - size / 2) + "px";
      ripple.style.top = (e.clientY - rect.top - size / 2) + "px";

      ripple.classList.add("ripple");

      const old = link.querySelector(".ripple");
      if (old) old.remove();

      link.appendChild(ripple);

      /* =========================
         🎵 AUDIO SYSTEM
      ========================= */
      const audioFile = link.dataset.audio;

      if (audioFile) {

        const audio = new Audio(audioFile);

        audio.play().catch(() => {
          window.location.href = link.href;
        });

        audio.onended = function () {
          window.location.href = link.href;
        };

        // backup navigation
        setTimeout(() => {
          window.location.href = link.href;
        }, 3000);

      } else {
        window.location.href = link.href;
      }

    });

  });

});

/* unlock scroll after animation */
window.addEventListener("load", function () {
  setTimeout(() => {
    document.body.classList.add("ready");
  }, 2300);
});
</script>
</body>
</html>
